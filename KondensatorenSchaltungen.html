<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universeller Kondensator-Baukasten</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Verhindert Flackern vor dem Laden der Icons */
        .lucide { width: 1em; height: 1em; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 h-screen overflow-x-hidden">

<div class="flex flex-col h-full p-4 md:p-6 min-h-[900px]">
    
    <!-- Header -->
    <header class="mb-6 pb-4 border-b-2 border-slate-200">
        <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">
            Universeller Kondensator-Baukasten
        </h1>
        <p class="text-base md:text-lg text-slate-600">Freies Erstellen von Parallel-, Serien- und gemischten Schaltungen</p>
    </header>

    <!-- Main Content Area -->
    <div class="flex flex-col xl:flex-row gap-6 h-full">
        
        <!-- Linke Spalte: Schaltkreis & Editor -->
        <div class="flex-1 flex flex-col gap-4">
            
            <!-- Preset Buttons -->
            <div class="flex flex-wrap gap-2 bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                <span class="flex items-center text-sm font-bold text-slate-500 mr-2 uppercase tracking-wide">Presets:</span>
                <button onclick="setPresetParallel()" class="flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-lg text-sm font-medium transition-colors">
                    <i data-lucide="split-square-horizontal" class="w-4 h-4 rotate-90"></i> Nur Parallel
                </button>
                <button onclick="setPresetSeries()" class="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded-lg text-sm font-medium transition-colors">
                    <i data-lucide="layers" class="w-4 h-4 rotate-90"></i> Nur Serie
                </button>
                <button onclick="setPresetMixed()" class="flex items-center gap-1.5 px-3 py-1.5 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded-lg text-sm font-medium transition-colors">
                    <i data-lucide="zap" class="w-4 h-4"></i> Gemischt
                </button>
                <button onclick="resetCircuit()" class="ml-auto flex items-center gap-1.5 px-3 py-1.5 text-slate-500 hover:bg-slate-100 rounded-lg text-sm font-medium transition-colors">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset
                </button>
            </div>

            <!-- SVG Visualisierung -->
            <div class="bg-white border border-slate-200 shadow-md rounded-xl overflow-x-auto overflow-y-hidden relative flex items-center min-h-[400px]">
                <div id="svg-container" class="w-full h-full"></div>
                
                <!-- Didaktischer Hinweis -->
                <div class="absolute top-4 left-4 right-4 flex justify-center pointer-events-none">
                    <div id="didactic-info" class="bg-white/90 backdrop-blur-sm border border-slate-200 shadow-sm px-4 py-2 rounded-full text-sm font-bold text-slate-700 flex items-center gap-2">
                        <!-- Wird via JS gefüllt -->
                    </div>
                </div>
            </div>

            <!-- Editor-Panel für die Werte -->
            <div class="bg-white border border-slate-200 shadow-md rounded-xl p-5">
                <h3 class="font-bold text-slate-800 flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
                    <i data-lucide="calculator" class="w-5 h-5 text-indigo-500"></i>
                    Werte anpassen
                </h3>
                
                <div id="editor-container" class="flex gap-4 overflow-x-auto pb-2">
                    <!-- Wird via JS gefüllt -->
                </div>
            </div>
        </div>

        <!-- Rechte Spalte: Mathematische Herleitung -->
        <div class="w-full xl:w-[450px] flex flex-col gap-4">
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl p-6 text-white shadow-xl flex-1 flex flex-col h-full relative overflow-hidden">
                <!-- Dekorativer Hintergrund -->
                <i data-lucide="zap" class="absolute -right-10 -bottom-10 w-48 h-48 text-slate-700 opacity-20"></i>
                
                <h3 class="text-xl font-bold mb-6 border-b border-slate-700 pb-3 flex items-center gap-2">
                    Berechnungsweg
                </h3>

                <div id="math-container" class="flex-1 flex flex-col gap-6 relative z-10 overflow-y-auto pr-2">
                    <!-- Wird via JS gefüllt -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- State ---
    let circuit = [
        [ { id: 'c1', value: 10 }, { id: 'c2', value: 20 } ]
    ];
    let nextId = 3;

    // --- State Manipulation ---
    window.setPresetParallel = () => {
        circuit = [[ { id: 'c1', value: 10 }, { id: 'c2', value: 20 }, { id: 'c3', value: 30 } ]];
        nextId = 4;
        updateUI();
    };

    window.setPresetSeries = () => {
        circuit = [[ { id: 'c1', value: 10 } ], [ { id: 'c2', value: 20 } ], [ { id: 'c3', value: 30 } ]];
        nextId = 4;
        updateUI();
    };

    window.setPresetMixed = () => {
        circuit = [
            [ { id: 'c1', value: 10 }, { id: 'c2', value: 10 } ], 
            [ { id: 'c3', value: 20 } ]
        ];
        nextId = 4;
        updateUI();
    };

    window.resetCircuit = () => {
        circuit = [[{id:'c1', value:10}]];
        nextId = 2;
        updateUI();
    };

    window.addSeriesBlock = () => {
        if (circuit.length < 5) {
            circuit.push([{ id: `c${nextId}`, value: 10 }]);
            nextId++;
            updateUI();
        }
    };

    window.addParallelCap = (blockIndex) => {
        if (circuit[blockIndex].length < 4) {
            circuit[blockIndex].push({ id: `c${nextId}`, value: 10 });
            nextId++;
            updateUI();
        }
    };

    window.removeCap = (blockIndex, capIndex) => {
        circuit[blockIndex].splice(capIndex, 1);
        
        // Wenn der Block leer ist, entferne den ganzen Block
        if (circuit[blockIndex].length === 0) {
            circuit.splice(blockIndex, 1);
        }
        
        // Mindestens ein Kondensator muss übrig bleiben
        if (circuit.length === 0) {
            circuit.push([{ id: `c${nextId}`, value: 10 }]);
            nextId++;
        }
        
        updateUI();
    };

    window.updateCapValue = (blockIndex, capIndex, newValue) => {
        circuit[blockIndex][capIndex].value = Number(newValue);
        
        // Update nur den Text-Wert im Editor, ohne den Slider neu zu laden (verhindert Abbruch beim Ziehen)
        const valDisplay = document.getElementById(`val-${blockIndex}-${capIndex}`);
        if (valDisplay) {
            valDisplay.innerText = `${newValue} µF`;
        }

        // SVG und Mathe neu berechnen
        const calc = calculate();
        renderSVG();
        renderMath(calc);
        lucide.createIcons();
    };

    // --- Calculations ---
    function calculate() {
        const blockCaps = circuit.map(block => 
            block.reduce((sum, cap) => sum + cap.value, 0)
        );

        const sumInv = blockCaps.reduce((sum, c) => sum + (c > 0 ? 1 / c : 0), 0);
        const totalCap = sumInv > 0 ? 1 / sumInv : 0;

        const isPureParallel = circuit.length === 1 && circuit[0].length > 1;
        const isPureSeries = circuit.length > 1 && circuit.every(b => b.length === 1);
        const isMixed = circuit.length > 1 && circuit.some(b => b.length > 1);
        const isSingle = circuit.length === 1 && circuit[0].length === 1;

        return { blockCaps, totalCap, isPureParallel, isPureSeries, isMixed, isSingle };
    }

    // --- Renderers ---
    function renderSVG() {
        const blockWidth = 140;
        const totalWidth = circuit.length * blockWidth + 100;
        const centerY = 200;
        const ySpacing = 65;

        let blocksHTML = circuit.map((block, bIdx) => {
            const startX = 50 + bIdx * blockWidth;
            const endX = startX + blockWidth;
            const midX = startX + blockWidth / 2;
            const numCaps = block.length;
            
            const blockHeight = (numCaps - 1) * ySpacing;
            const topY = centerY - blockHeight / 2;
            const bottomY = centerY + blockHeight / 2;

            let blockContent = '';

            // Hauptleitung zwischen Blöcken
            if (bIdx < circuit.length - 1) {
                blockContent += `<line x1="${endX}" y1="${centerY}" x2="${endX + blockWidth}" y2="${centerY}" stroke="#334155" stroke-width="3" />`;
            }

            // Vertikale Verteiler oder einfache Durchleitung
            if (numCaps > 1) {
                blockContent += `
                    <line x1="${startX + 20}" y1="${topY}" x2="${startX + 20}" y2="${bottomY}" stroke="#334155" stroke-width="3" />
                    <line x1="${endX - 20}" y1="${topY}" x2="${endX - 20}" y2="${bottomY}" stroke="#334155" stroke-width="3" />
                    <line x1="${startX}" y1="${centerY}" x2="${startX + 20}" y2="${centerY}" stroke="#334155" stroke-width="3" />
                    <line x1="${endX - 20}" y1="${centerY}" x2="${endX}" y2="${centerY}" stroke="#334155" stroke-width="3" />
                `;
            } else {
                blockContent += `
                    <line x1="${startX}" y1="${centerY}" x2="${startX + 20}" y2="${centerY}" stroke="#334155" stroke-width="3" />
                    <line x1="${endX - 20}" y1="${centerY}" x2="${endX}" y2="${centerY}" stroke="#334155" stroke-width="3" />
                `;
            }

            // Kondensatoren
            blockContent += block.map((cap, cIdx) => {
                const y = numCaps === 1 ? centerY : topY + cIdx * ySpacing;
                const cName = cap.id.replace('c','');
                
                return `
                    <g class="transition-all duration-300">
                        <line x1="${startX + 20}" y1="${y}" x2="${midX - 10}" y2="${y}" stroke="#334155" stroke-width="3" />
                        <line x1="${midX + 10}" y1="${y}" x2="${endX - 20}" y2="${y}" stroke="#334155" stroke-width="3" />
                        
                        <line x1="${midX - 10}" y1="${y - 15}" x2="${midX - 10}" y2="${y + 15}" stroke="#0f172a" stroke-width="4" />
                        <line x1="${midX + 10}" y1="${y - 15}" x2="${midX + 10}" y2="${y + 15}" stroke="#0f172a" stroke-width="4" />
                        
                        <text x="${midX}" y="${y - 20}" text-anchor="middle" class="fill-slate-800 font-bold text-sm">C${cName}</text>
                        <text x="${midX}" y="${y + 25}" text-anchor="middle" class="fill-blue-600 text-xs font-mono">${cap.value} µF</text>
                        
                        <text x="${midX - 22}" y="${y - 5}" class="fill-red-500 text-[10px] font-bold">+</text>
                        <text x="${midX + 15}" y="${y - 5}" class="fill-blue-500 text-[10px] font-bold">-</text>

                        <foreignObject x="${midX + 18}" y="${y - 32}" width="24" height="24">
                            <button onclick="window.removeCap(${bIdx}, ${cIdx})" class="w-full h-full rounded-full bg-white/80 hover:bg-red-100 border border-slate-200 hover:border-red-300 flex items-center justify-center text-slate-400 hover:text-red-600 transition-colors shadow-sm" title="Kondensator löschen">
                                <i data-lucide="trash-2" class="w-3 h-3"></i>
                            </button>
                        </foreignObject>
                    </g>
                `;
            }).join('');

            // "Parallel hinzufügen" Button
            if (numCaps < 4) {
                blockContent += `
                    <foreignObject x="${midX - 15}" y="${bottomY + 30}" width="30" height="30">
                        <button onclick="window.addParallelCap(${bIdx})" class="w-full h-full rounded-full bg-slate-100 hover:bg-blue-100 border border-slate-300 hover:border-blue-400 flex items-center justify-center text-slate-500 hover:text-blue-600 transition-colors shadow-sm" title="Parallelkondensator hinzufügen">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </foreignObject>
                `;
            }

            return `<g>${blockContent}</g>`;
        }).join('');

        // Serien-Block hinzufügen Button
        let addSeriesBtn = '';
        if (circuit.length < 5) {
            addSeriesBtn = `
                <foreignObject x="${80 + circuit.length * blockWidth - 15}" y="${centerY - 15}" width="30" height="30">
                    <button onclick="window.addSeriesBlock()" class="w-full h-full rounded-full bg-slate-100 hover:bg-emerald-100 border border-slate-300 hover:border-emerald-400 flex items-center justify-center text-slate-500 hover:text-emerald-600 transition-colors shadow-sm" title="In Serie erweitern">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </foreignObject>
            `;
        }

        const svgHTML = `
            <svg viewBox="0 0 ${Math.max(totalWidth, 600)} 400" class="w-full h-full min-h-[300px]" preserveAspectRatio="xMidYMid meet">
                <!-- Hauptanschlüsse -->
                <line x1="20" y1="${centerY}" x2="50" y2="${centerY}" stroke="#334155" stroke-width="3" />
                <circle cx="20" cy="${centerY}" r="5" fill="#ef4444" />
                <text x="15" y="${centerY - 15}" class="fill-red-600 font-bold text-lg">+</text>

                <line x1="${50 + circuit.length * blockWidth}" y1="${centerY}" x2="${80 + circuit.length * blockWidth}" y2="${centerY}" stroke="#334155" stroke-width="3" />
                <circle cx="${80 + circuit.length * blockWidth}" cy="${centerY}" r="5" fill="#3b82f6" />
                <text x="${75 + circuit.length * blockWidth}" y="${centerY - 15}" class="fill-blue-600 font-bold text-lg">-</text>

                <!-- Spannungs-Pfeil -->
                <g class="opacity-60">
                    <path d="M 20 ${centerY + 140} L ${80 + circuit.length * blockWidth} ${centerY + 140}" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
                    <path d="M 20 ${centerY + 130} L 20 ${centerY + 150}" stroke="#334155" stroke-width="2" />
                    <path d="M ${80 + circuit.length * blockWidth} ${centerY + 130} L ${80 + circuit.length * blockWidth} ${centerY + 150}" stroke="#334155" stroke-width="2" />
                    <text x="${40 + (circuit.length * blockWidth) / 2}" y="${centerY + 135}" text-anchor="middle" class="fill-slate-700 font-bold italic text-lg">U_ges</text>
                </g>

                ${blocksHTML}
                ${addSeriesBtn}
            </svg>
        `;

        document.getElementById('svg-container').innerHTML = svgHTML;
    }

    function renderEditor() {
        const html = circuit.map((block, bIdx) => {
            const blockType = block.length > 1 ? '(Parallel)' : '';
            const effectHtml = block.length > 1 
                ? `<span><strong class="text-blue-600">Parallel-Effekt:</strong> Lineare Addition (1:1). Erhöhung wirkt direkt auf C<sub>ges</sub>.</span>`
                : `<span><strong class="text-emerald-600">Serien-Effekt:</strong> Reziproke Addition. Erhöhung flacht ab. C<sub>ges</sub> bleibt stets kleiner als der kleinste Kondensator.</span>`;

            const capsHtml = block.map((cap, cIdx) => `
                <div class="bg-white p-3 rounded-lg border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-slate-700">C${cap.id.replace('c','')}</span>
                        <div class="flex items-center gap-2">
                            <span id="val-${bIdx}-${cIdx}" class="font-mono text-blue-600 font-bold bg-blue-50 px-2 py-0.5 rounded">${cap.value} µF</span>
                            <button onclick="window.removeCap(${bIdx}, ${cIdx})" class="text-slate-400 hover:text-red-500 transition-colors p-1 bg-slate-50 hover:bg-red-50 rounded" title="Entfernen">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <input type="range" min="1" max="100" step="1" value="${cap.value}" oninput="window.updateCapValue(${bIdx}, ${cIdx}, this.value)" class="w-full accent-blue-600" />
                    <div class="text-[10px] text-slate-600 mt-2 leading-tight bg-slate-50 p-2 rounded border border-slate-100 shadow-sm">
                        ${effectHtml}
                    </div>
                </div>
            `).join('');

            return `
                <div class="min-w-[200px] bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col gap-3">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">
                        Block ${bIdx + 1} ${blockType}
                    </div>
                    ${capsHtml}
                </div>
            `;
        }).join('');

        document.getElementById('editor-container').innerHTML = html;
    }

    function renderMath(calc) {
        // Didaktischer Hinweis (Top Overlay im SVG Container)
        let infoHtml = '<i data-lucide="info" class="w-4 h-4 text-blue-500"></i> ';
        if (calc.isPureParallel) infoHtml += "Reine Parallelschaltung: U ist überall identisch. C addiert sich.";
        else if (calc.isPureSeries) infoHtml += "Reine Serienschaltung: Q ist auf allen Kondensatoren gleich. 1/C addiert sich.";
        else if (calc.isMixed) infoHtml += "Gemischte Schaltung: Erst parallele Blöcke zusammenfassen, dann die Reihe berechnen!";
        else if (calc.isSingle) infoHtml += "Ein einzelner Kondensator. Füge weitere hinzu!";
        document.getElementById('didactic-info').innerHTML = infoHtml;

        // Mathe Panel (Rechte Seite)
        let mathHtml = '';

        // Schritt 1: Parallelschaltungen
        if (calc.isMixed || calc.isPureParallel) {
            let pSteps = circuit.map((block, i) => {
                if (block.length > 1) {
                    return `
                        <div class="flex flex-col gap-1 border-l-2 border-emerald-500 pl-3">
                            <span class="text-slate-400">Block ${i+1}:</span>
                            <span class="text-white">C<sub>p${i+1}</sub> = ${block.map(c => c.value).join(' + ')}</span>
                            <span class="text-emerald-300 font-bold">C<sub>p${i+1}</sub> = ${calc.blockCaps[i]} µF</span>
                        </div>
                    `;
                }
                return '';
            }).join('');

            mathHtml += `
                <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                    <div class="text-emerald-400 text-sm font-bold uppercase tracking-wide mb-3">Schritt 1: Parallelschaltungen</div>
                    <p class="text-slate-300 text-sm mb-3">
                        Für parallel geschaltete Kondensatoren gilt: <br/>
                        <span class="font-serif text-lg text-white">C<sub>p</sub> = Σ C<sub>i</sub></span>
                    </p>
                    <div class="space-y-2 font-mono text-sm">${pSteps}</div>
                </div>
            `;
        }

        // Schritt 2: Serienschaltung
        if (circuit.length > 1) {
            const fractions = calc.blockCaps.map(c => `1/${c}`).join(' + ');
            const decimals = calc.blockCaps.map(c => (1/c).toFixed(3)).join(' + ');

            mathHtml += `
                <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                    <div class="text-blue-400 text-sm font-bold uppercase tracking-wide mb-3">Schritt 2: Serienschaltung</div>
                    <p class="text-slate-300 text-sm mb-3">
                        Für in Reihe geschaltete Blöcke gilt: <br/>
                        <span class="font-serif text-lg text-white">1 / C<sub>ges</sub> = Σ (1 / C<sub>i</sub>)</span>
                    </p>
                    <div class="font-mono text-sm space-y-3 border-l-2 border-blue-500 pl-3">
                        <div class="text-white overflow-x-auto pb-2">1 / C<sub>ges</sub> = ${fractions}</div>
                        <div class="text-slate-400 text-xs overflow-x-auto pb-1">1 / C<sub>ges</sub> ≈ ${decimals}</div>
                        <div class="text-white">1 / C<sub>ges</sub> = ${(1/calc.totalCap).toFixed(4)}</div>
                    </div>
                </div>
            `;
        }

        // Endergebnis
        mathHtml += `
            <div class="mt-auto pt-6">
                <div class="text-slate-400 text-sm mb-2 text-center uppercase tracking-widest font-bold">Gesamtkapazität</div>
                <div class="bg-white/10 p-4 rounded-xl border border-white/20 text-center shadow-inner">
                    <div class="font-serif text-4xl font-bold text-white tracking-tight">
                        ${calc.totalCap.toFixed(2)} <span class="text-2xl text-blue-300">µF</span>
                    </div>
                </div>
            </div>

            <!-- Didaktischer Fokus Box -->
            <div class="mt-4 bg-indigo-900/40 p-4 rounded-xl border border-indigo-500/30">
                <h4 class="text-indigo-300 font-bold text-sm mb-3 flex items-center gap-2">
                    <i data-lucide="lightbulb" class="w-4 h-4"></i> Fokus: Auswirkungen
                </h4>
                <div class="space-y-3 text-xs text-slate-300 leading-relaxed">
                    <p><strong class="text-blue-300">In Parallelschaltungen:</strong> Jeder Kondensator addiert seine Kapazität direkt. Vergrößern Sie einen Wert extrem, dominiert er die Schaltung und <span class="text-white">C<sub>ges</sub> wächst unbegrenzt mit</span>.</p>
                    <p><strong class="text-emerald-300">In Serienschaltungen:</strong> Ein großer Kondensator wirkt zunehmend wie ein Kurzschluss (er setzt der Ladung kaum noch Widerstand entgegen). Vergrößern Sie seinen Wert extrem, nähert sich <span class="text-white">C<sub>ges</sub> asymptotisch den restlichen Kondensatoren an</span>. Es gilt stets: C<sub>ges</sub> wird <span class="underline">niemals</span> größer als die kleinste Einzelkapazität der Reihe!</p>
                </div>
            </div>
        `;

        document.getElementById('math-container').innerHTML = mathHtml;
    }

    // --- Main Update Loop ---
    function updateUI() {
        const calc = calculate();
        renderSVG();
        renderEditor();
        renderMath(calc);
        // Da wir das DOM ständig überschreiben, müssen die Icons neu generiert werden
        lucide.createIcons();
    }

    // Initialisierung
    document.addEventListener('DOMContentLoaded', updateUI);

</script>
</body>
</html>
