<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physik — Visualisierungen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fafaf7;
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .intro {
      color: #555;
      font-size: 1.05rem;
      max-width: 60ch;
    }

    .intro p + p {
      margin-top: 0.5rem;
    }

    /* Landing: two big choice cards */
    .choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-top: 1rem;
    }

    @media (max-width: 600px) {
      .choice-grid { grid-template-columns: 1fr; }
    }

    .choice-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem 2rem;
      background: #fff;
      border: 1px solid #e5e5e0;
      border-radius: 12px;
      text-decoration: none;
      color: #1a1a1a;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 200px;
      text-align: left;
      font-family: inherit;
    }

    .choice-card:hover {
      border-color: #1a1a1a;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .choice-card .label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .choice-card .title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    .choice-card .arrow {
      font-size: 1.5rem;
      color: #999;
      align-self: flex-end;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .choice-card:hover .arrow {
      color: #1a1a1a;
      transform: translateX(6px);
    }

    /* Content view (after selection) */
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: none;
      color: #666;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      padding: 0.5rem 0;
      margin-bottom: 1.5rem;
      transition: color 0.15s ease;
    }

    .back-button:hover {
      color: #1a1a1a;
    }

    .content-view {
      display: none;
    }

    .content-view.active {
      display: block;
    }

    .landing-view.hidden {
      display: none;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    h3:first-of-type {
      margin-top: 0;
    }

    .topics {
      list-style: none;
      display: grid;
      gap: 0.5rem;
    }

    .topics li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem;
      background: #fff;
      border: 1px solid #e5e5e0;
      border-radius: 8px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .topics li a:hover {
      border-color: #1a1a1a;
      transform: translateX(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .topics li a::after {
      content: "→";
      color: #999;
      font-size: 1.1rem;
      transition: color 0.15s ease;
    }

    .topics li a:hover::after {
      color: #1a1a1a;
    }

    .loading, .empty, .error {
      color: #888;
      font-style: italic;
      padding: 1rem 0;
    }

    .error {
      color: #b00020;
    }

    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e5e0;
      color: #999;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Physik — Visualisierungen</h1>
      <div class="intro">
        <p>Sammlung der in der Vorlesung und Übungen gezeigten Visualisierungen.</p>
        <p>Alle Visualisierungen wurden mit Google Gemini (Pro + Canvas) erstellt.</p>
      </div>
    </header>

    <!-- Landing: two choice cards -->
    <div id="landing" class="landing-view">
      <div class="choice-grid">
        <button class="choice-card" onclick="showSection('vorlesungen')">
          <div>
            <div class="label">Kategorie</div>
            <div class="title">Vorlesungen</div>
          </div>
          <div class="arrow">→</div>
        </button>
        <button class="choice-card" onclick="showSection('uebungen')">
          <div>
            <div class="label">Kategorie</div>
            <div class="title">Übungen</div>
          </div>
          <div class="arrow">→</div>
        </button>
      </div>
    </div>

    <!-- Vorlesungen view -->
    <div id="vorlesungen" class="content-view">
      <button class="back-button" onclick="showLanding()">← Zurück</button>
      <h2>Vorlesungen</h2>
      <div id="vorlesungen-content" class="loading">Lade Inhalte…</div>
    </div>

    <!-- Übungen view -->
    <div id="uebungen" class="content-view">
      <button class="back-button" onclick="showLanding()">← Zurück</button>
      <h2>Übungen</h2>
      <div id="uebungen-content" class="loading">Lade Inhalte…</div>
    </div>

    <footer>
      Stand: April 2026
    </footer>
  </div>

  <script>
    // ====== CONFIGURATION ======
    const GITHUB_USER = 'lucahighfield';
    const GITHUB_REPO = 'lucahighfield.github.io';
    const BRANCH = 'main';

    // Map section ID → repo folder name (case-sensitive!)
    const SECTIONS = {
      vorlesungen: 'Vorlesungen',
      uebungen: 'Übungen'
    };
    // ===========================

    const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;

    // Turn a filename into a readable title
    // "GaußscheFlächen.html" → "Gaußsche Flächen"
    function prettifyName(filename) {
      let name = filename.replace(/\.html?$/i, '');
      // Insert space before capital letters (but not the first one)
      name = name.replace(/([a-zäöüß])([A-ZÄÖÜ])/g, '$1 $2');
      // Replace underscores and dashes with spaces
      name = name.replace(/[_-]+/g, ' ');
      return name.trim();
    }

    // Sort helper: "VL1", "VL2", "VL10" → numerically
    function naturalSort(a, b) {
      return a.localeCompare(b, 'de', { numeric: true, sensitivity: 'base' });
    }

    async function fetchFolder(path) {
      const url = `${API_BASE}/${encodeURIComponent(path).replace(/%2F/g, '/')}?ref=${BRANCH}`;
      const res = await fetch(url);
      if (!res.ok) {
        if (res.status === 404) return []; // folder not there yet
        throw new Error(`GitHub API ${res.status}`);
      }
      return res.json();
    }

    async function loadSection(sectionKey) {
      const folder = SECTIONS[sectionKey];
      const target = document.getElementById(`${sectionKey}-content`);

      try {
        const items = await fetchFolder(folder);

        // Keep only subdirectories (VL1, VL2, Blatt1, ...)
        const subfolders = items
          .filter(i => i.type === 'dir')
          .sort((a, b) => naturalSort(a.name, b.name));

        if (subfolders.length === 0) {
          target.className = 'empty';
          target.textContent = 'Noch keine Inhalte vorhanden.';
          return;
        }

        // Fetch contents of each subfolder in parallel
        const subfolderData = await Promise.all(
          subfolders.map(async sub => {
            const contents = await fetchFolder(`${folder}/${sub.name}`);
            const htmlFiles = contents
              .filter(f => f.type === 'file' && /\.html?$/i.test(f.name))
              .sort((a, b) => naturalSort(a.name, b.name));
            return { name: sub.name, files: htmlFiles };
          })
        );

        // Render
        target.className = '';
        target.innerHTML = '';

        subfolderData.forEach(sub => {
          const heading = document.createElement('h3');
          heading.textContent = sub.name;
          target.appendChild(heading);

          if (sub.files.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = 'Keine Dateien.';
            target.appendChild(empty);
            return;
          }

          const ul = document.createElement('ul');
          ul.className = 'topics';
          sub.files.forEach(file => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = `${folder}/${sub.name}/${file.name}`;
            a.textContent = prettifyName(file.name);
            li.appendChild(a);
            ul.appendChild(li);
          });
          target.appendChild(ul);
        });
      } catch (err) {
        target.className = 'error';
        target.textContent = `Fehler beim Laden: ${err.message}. (Eventuell GitHub-API-Limit erreicht — bitte später erneut versuchen.)`;
      }
    }

    function showSection(key) {
      document.getElementById('landing').classList.add('hidden');
      document.querySelectorAll('.content-view').forEach(el => el.classList.remove('active'));
      document.getElementById(key).classList.add('active');
      loadSection(key);
      history.replaceState(null, '', `#${key}`);
    }

    function showLanding() {
      document.querySelectorAll('.content-view').forEach(el => el.classList.remove('active'));
      document.getElementById('landing').classList.remove('hidden');
      history.replaceState(null, '', '#');
    }

    // Restore view from hash on page load
    window.addEventListener('DOMContentLoaded', () => {
      const hash = window.location.hash.replace('#', '');
      if (hash === 'vorlesungen' || hash === 'uebungen') {
        showSection(hash);
      }
    });
  </script>
</body>
</html>
