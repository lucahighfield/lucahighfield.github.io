<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Diffusion Wave Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Verhindert das Markieren von Text beim schnellen Klicken auf die Buttons */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen m-0 p-0">

    <div class="flex flex-col items-center justify-center w-full min-h-screen p-4">
        <div class="w-full max-w-5xl bg-white rounded-xl shadow-lg overflow-hidden flex flex-col border border-gray-200">
            
            <!-- Folien-Titel -->
            <div class="p-6 border-b border-gray-100">
                <h1 class="text-3xl font-bold text-gray-900">
                    Illustration of why a 1-component RD-system supports traveling waves
                </h1>
            </div>

            <!-- Visualisierungs-Bereich -->
            <div class="relative w-full aspect-[2/1] bg-white overflow-hidden flex items-center justify-center">
                <canvas id="rd-canvas" width="1000" height="500" class="w-full h-full object-contain"></canvas>
            </div>

            <!-- Kontroll-Panel (Steuerung für die Vorlesung) -->
            <div class="bg-gray-100 p-4 border-t border-gray-200 flex flex-col gap-4 no-select">
                <div class="flex justify-between items-center w-full">
                    
                    <button id="btn-prev" class="px-6 py-2 rounded-md font-semibold transition-colors bg-white text-gray-700 hover:bg-gray-200 shadow-sm border border-gray-300 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed disabled:border-transparent disabled:shadow-none">
                        &larr; Previous Step
                    </button>
                    
                    <div id="step-indicators" class="flex space-x-2">
                        <!-- Dots werden per JavaScript generiert -->
                    </div>

                    <button id="btn-next" class="px-6 py-2 rounded-md font-semibold transition-colors bg-blue-600 text-white hover:bg-blue-700 shadow-sm disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed disabled:shadow-none">
                        Next Step &rarr;
                    </button>
                </div>

                <div class="text-center text-sm font-medium text-gray-600">
                    Current Phase: <span id="current-phase-text" class="text-blue-600">Initial Condition</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // --- State und Konfiguration ---
            const steps = [
                "Initial Condition",
                "Diffusion Phase",
                "Reaction Phase",
                "Traveling Wave"
            ];
            
            let currentStep = 0;
            let progress = 0;
            let waveTime = 0;
            let animationId;

            // --- DOM Elemente ---
            const canvas = document.getElementById('rd-canvas');
            const ctx = canvas.getContext('2d');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const stepIndicatorsContainer = document.getElementById('step-indicators');
            const currentPhaseText = document.getElementById('current-phase-text');

            // --- Konstanten für das Zeichnen ---
            const W = 1000;
            const H = 500;
            const ox = 100; // x-Ursprung
            const oy = 400; // y-Ursprung
            
            const u3 = 150; // oberes Niveau
            const u2 = 300; // instabiler Fixpunkt
            const u1 = 350; // unteres Niveau
            
            const x0 = 300; // Initiale Position der Stufe
            const w = 40;   // Breite der Diffusions-Sigmoide
            
            // Berechne die neue Position der Stufe nach der Reaktion
            const E = (u2 - u3) / (u1 - u2);
            const xc = x0 + w * Math.log(E); // Die neue Interface-Position

            // --- UI Initialisierung und Update ---
            function initUI() {
                // Generiere die Dots
                steps.forEach((stepName, idx) => {
                    const dot = document.createElement('div');
                    dot.className = 'w-3 h-3 rounded-full cursor-pointer transition-all bg-gray-300 hover:bg-gray-400 step-dot';
                    dot.title = stepName;
                    dot.addEventListener('click', () => {
                        currentStep = idx;
                        updateUI();
                    });
                    stepIndicatorsContainer.appendChild(dot);
                });
                updateUI();
            }

            function updateUI() {
                // Buttons aktivieren/deaktivieren
                btnPrev.disabled = currentStep === 0;
                btnNext.disabled = currentStep === steps.length - 1;

                // Text aktualisieren
                currentPhaseText.textContent = steps[currentStep];

                // Dots aktualisieren
                const dots = document.querySelectorAll('.step-dot');
                dots.forEach((dot, idx) => {
                    if (idx === currentStep) {
                        dot.className = 'w-3 h-3 rounded-full cursor-pointer transition-all step-dot bg-blue-600 scale-125';
                    } else if (idx < currentStep) {
                        dot.className = 'w-3 h-3 rounded-full cursor-pointer transition-all step-dot bg-blue-400';
                    } else {
                        dot.className = 'w-3 h-3 rounded-full cursor-pointer transition-all step-dot bg-gray-300 hover:bg-gray-400';
                    }
                });
            }

            // --- Event Listeners für Buttons ---
            btnPrev.addEventListener('click', () => {
                if (currentStep > 0) {
                    currentStep--;
                    updateUI();
                }
            });

            btnNext.addEventListener('click', () => {
                if (currentStep < steps.length - 1) {
                    currentStep++;
                    updateUI();
                }
            });

            // --- Zeichen-Hilfsfunktionen ---
            function drawArrow(fromx, fromy, tox, toy, arrowWidth, color) {
                const headlen = 12; 
                const dx = tox - fromx;
                const dy = toy - fromy;
                const angle = Math.atan2(dy, dx);
                
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = arrowWidth;
                ctx.moveTo(fromx, fromy);
                ctx.lineTo(tox, toy);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.fillStyle = color;
                ctx.moveTo(tox, toy);
                ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
                ctx.fill();
            }

            function drawSigmoid(x_center, color, lineWidth, opacity = 1) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(${color}, ${opacity})`;
                ctx.lineWidth = lineWidth;
                for (let x = ox; x <= 950; x++) {
                    const y = u1 + (u3 - u1) / (1 + Math.exp((x - x_center) / w));
                    if (x === ox) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            // --- Haupt-Zeichenschleife (Render-Loop) ---
            function renderLoop() {
                // 1. Aktualisiere den Animations-Fortschritt weich in Richtung des Ziel-Schritts
                if (Math.abs(progress - currentStep) > 0.005) {
                    progress += Math.sign(currentStep - progress) * 0.03;
                } else {
                    progress = currentStep;
                }
                const p = Math.max(0, progress);

                // Zeit für die fortlaufende Welle im letzten Schritt aktualisieren
                if (p > 2.9) {
                    waveTime += 1;
                } else {
                    waveTime = 0;
                }

                // 2. Canvas leeren
                ctx.clearRect(0, 0, W, H);

                // 3. Achsen und Beschriftungen zeichnen
                ctx.beginPath();
                ctx.moveTo(ox, 50); ctx.lineTo(ox, oy); ctx.lineTo(950, oy);
                ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.stroke();
                
                drawArrow(950, oy, 960, oy, 2, "black");
                drawArrow(ox, 50, ox, 40, 2, "black");

                ctx.font = "italic 22px 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
                ctx.fillStyle = "black";
                ctx.fillText("u", ox - 25, 50);
                ctx.fillText("x", 950, oy + 25);
                
                ctx.font = "18px sans-serif";
                ctx.fillText("u₃", ox - 35, u3 + 6);
                ctx.fillText("u₂", ox - 35, u2 + 6);
                ctx.fillText("u₁", ox - 35, u1 + 6);

                // Gestrichelte Linien für die Niveaus
                ctx.setLineDash([5, 5]);
                ctx.beginPath(); ctx.moveTo(ox, u2); ctx.lineTo(900, u2);
                ctx.strokeStyle = "rgba(37, 99, 235, 0.4)"; ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(ox, u1); ctx.lineTo(900, u1);
                ctx.strokeStyle = "rgba(0, 0, 0, 0.1)"; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(ox, u3); ctx.lineTo(900, u3);
                ctx.strokeStyle = "rgba(0, 0, 0, 0.1)"; ctx.stroke();
                ctx.setLineDash([]);

                // 4. Zeichne die verschiedenen Phasen basierend auf `p`
                if (p < 3.0) {
                    // --- PHASE 1 bis 3 (Gedankenexperiment) ---
                    
                    const gedankenOpacity = 1 - Math.max(0, p - 2);
                    ctx.fillStyle = `rgba(0, 0, 0, ${gedankenOpacity})`;
                    ctx.font = "bold 20px sans-serif";
                    ctx.fillText("Let's first do a 'Gedankenexperiment':", ox - 50, 30);

                    // Initiale Stufe (Phase 0)
                    ctx.beginPath();
                    ctx.moveTo(ox, u3); ctx.lineTo(x0, u3);
                    ctx.lineTo(x0, u1); ctx.lineTo(900, u1);
                    ctx.strokeStyle = `rgba(37, 99, 235, ${gedankenOpacity})`; 
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    ctx.fillStyle = `rgba(37, 99, 235, ${gedankenOpacity})`;
                    ctx.font = "18px sans-serif";
                    ctx.fillText("initial condition: t₀", x0 - 150, u3 - 20);

                    // Diffusion (Phase 1)
                    if (p > 0) {
                        const diffOpacity = Math.min(1, p) * gedankenOpacity;
                        drawSigmoid(x0, "249, 115, 22", 3, diffOpacity); // Tailwind orange-500
                        
                        ctx.fillStyle = `rgba(249, 115, 22, ${diffOpacity})`;
                        ctx.fillText("between t₀ and t₁=t₀ + Δt switch on only diffusion", x0 + 120, u3 - 20);
                    }

                    // Reaktion (Phase 2)
                    if (p > 1) {
                        const reactP = Math.min(1, p - 1);
                        const arrowOpacity = Math.min(1, reactP * 2) * gedankenOpacity;
                        
                        // Vertikale Pfeile
                        const arrowXPositions = [220, 250, 280, 315, 345, 375];
                        arrowXPositions.forEach(ax => {
                            const yCurve = u1 + (u3 - u1) / (1 + Math.exp((ax - x0) / w));
                            const yTarget = ax < xc ? u3 : u1; 
                            
                            const currentArrowY = yCurve + (yTarget - yCurve) * Math.min(1, reactP * 2.5);
                            
                            if (Math.abs(yCurve - currentArrowY) > 5) {
                                drawArrow(ax, yCurve, ax, currentArrowY, 2, `rgba(37, 99, 235, ${arrowOpacity})`);
                            }
                        });

                        // Resultierendes Interface
                        if (reactP > 0.5) {
                            const resultOpacity = (reactP - 0.5) * 2 * gedankenOpacity;
                            
                            ctx.setLineDash([8, 6]);
                            ctx.beginPath();
                            ctx.moveTo(x0, u3); ctx.lineTo(xc, u3);
                            ctx.lineTo(xc, u1); ctx.lineTo(900, u1);
                            ctx.strokeStyle = `rgba(37, 99, 235, ${resultOpacity})`;
                            ctx.lineWidth = 3;
                            ctx.stroke();
                            ctx.setLineDash([]);

                            drawArrow(x0 + 5, (u3 + u2) / 2, xc - 5, (u3 + u2) / 2, 3, `rgba(37, 99, 235, ${resultOpacity})`);

                            ctx.fillStyle = `rgba(37, 99, 235, ${resultOpacity})`;
                            ctx.fillText("between t₁ and t₂=t₁ + Δt switch off diffusion and switch on the", x0 + 120, u3 + 25);
                            ctx.fillText("reaction", x0 + 120, u3 + 48);
                            ctx.font = "italic 18px sans-serif";
                            ctx.fillText("→ as a result, the interface moved to the right", x0 + 120, u3 + 80);
                        }
                    }
                } 
                
                // --- PHASE 4 (Traveling Wave) ---
                if (p > 2.0) {
                    const waveOpacity = Math.min(1, p - 2);
                    const currentWaveX = xc + (waveTime * 1.5); 
                    
                    drawSigmoid(currentWaveX, "101, 163, 13", 3, waveOpacity); // Tailwind lime-600
                    
                    drawArrow(currentWaveX - 40, u2, currentWaveX + 40, u2, 3, `rgba(101, 163, 13, ${waveOpacity})`);

                    ctx.fillStyle = `rgba(0, 0, 0, ${waveOpacity})`;
                    ctx.font = "bold 20px sans-serif";
                    ctx.fillText("Combined action of reaction and diffusion", x0 + 150, u3 + 20);
                    ctx.font = "18px sans-serif";
                    ctx.fillText("leads to a traveling wave, or", x0 + 150, u3 + 50);
                    ctx.fillText("a 'sharp' interface that travels with constant speed", x0 + 150, u3 + 75);
                }

                animationId = requestAnimationFrame(renderLoop);
            }

            // Start
            initUI();
            renderLoop();
        });
    </script>
</body>
</html>
